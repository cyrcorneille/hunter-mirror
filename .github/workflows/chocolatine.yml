name: Chocolatine

on:
    push:
    pull_request:

env:
    MIRROR_SSH_URL: git@github.com:cyrcorneille/hunter-mirror.git
    EXECUTABLES: "fazzbizz"

jobs:

    check_compilation_and_coding_style:
      runs-on: ubuntu-latest
      container: epitechcontent/epitest-docker
      if: "!startsWith(github.ref, 'refs/heads/no-ga/')"

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: check Coding style errors
          run:  banana-check-repo .

        - name: Compile the binary
          run: make
          timeout-minutes: 2
          env:
            CC: epiclang

        - name: Check coding style errors
          run: |
            if banana-check-repo . | grep -q "error"; then
              echo "::error file=.,line=1::Coding style errors detected"
              exit 1
            fi

        - name: Clean repository
          run: make clean

        - name: Check executables
          shell: bash
          run: |
            IFS=',' read -ra EXE <<< "$EXECUTABLES"
            for exe in "${EXE[@]}"; do
              if [ ! -x "$exe" ]; then
                echo "::error file=$exe::Missing or not executable"
                exit 1
              fi
            done

    run_tests:
      runs-on: ubuntu-latest
      container: epitechcontent/epitest-docker
      needs: check_compilation_and_coding_style
      if: "!startsWith(github.ref, 'refs/heads/no-ga/') && github.repository != 'repo/mirror'"

      steps:
        - uses: actions/checkout@v4

        - name: Run tests
          run: make tests_run
          timeout-minutes: 2

    push_to_mirror:
      runs-on: ubuntu-latest
      needs: run_tests
      if: github.event_name == 'push' && !startsWith(github.ref, 'refs/heads/no-ga/')

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Mirror repository
          uses: pixta-dev/repository-mirroring-action@v1
          with:
            target_repo_url: ${{ env.MIRROR_SSH_URL  }}
            ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}